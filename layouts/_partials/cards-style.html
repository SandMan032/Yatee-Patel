{{- /* Self-contained card-grid styling (plain CSS so it survives Congo's Tailwind purge). Theme-aware via Congo's `.dark` root class. */ -}}
<style>
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
    gap: 1.5rem;
    margin-top: 2rem;
  }
  .proj-card {
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 0.75rem;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.015);
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .proj-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.35);
    border-color: rgba(56, 189, 210, 0.6);
  }
  .proj-card__img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
  }
  .proj-card__body {
    padding: 1rem 1.15rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .proj-card__title {
    margin: 0;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .proj-card__meta {
    font-size: 0.8rem;
    opacity: 0.65;
  }
  .proj-card__desc {
    margin: 0;
    font-size: 0.92rem;
    line-height: 1.5;
    opacity: 0.8;
  }
  .dark .proj-card {
    border-color: rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.03);
  }
  .dark .proj-card:hover {
    box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.7);
    border-color: rgba(56, 189, 210, 0.5);
  }
</style>
